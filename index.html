<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Five-Fret HD</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">

<div class="header-left">

<img src="assets/logo.png" class="logo">

<div class="title-group">
<p class="subtitle">
Site is a work-in-progress, things might break.
</p>
</div>

</div>

<div class="header-center">

<input
type="text"
id="search"
placeholder="Search songs or artists..."
onkeyup="searchSongs()"
>

<button id="randomSong" class="tab">🎲 Random Song</button>

<!-- SORT BUTTONS -->
<div class="sort-buttons">

<button onclick="sortSongs('title')">
Sort by Song
</button>

<button onclick="sortSongs('artist')">
Sort by Artist
</button>

</div>

<div class="tabs">

<button
class="tab active"
onclick="switchTab('all', this)"
>
All
</button>
  
<button
class="tab"
onclick="switchTab('gh', this)"
>
<img src="assets/gh.png" alt="Guitar Hero">
</button>

<button
class="tab"
onclick="switchTab('gh2', this)"
>
<img src="assets/gh2.png" alt="Guitar Hero II">
</button>

<button
class="tab"
onclick="switchTab('ghwor', this)"
>
<img src="assets/ghwor.png" alt="Guitar Hero: Warriors of Rock">
</button>

<button
class="tab"
onclick="switchTab('ghwordlc', this)"
>
<img src="assets/ghwordlc.png" alt="Guitar Hero: Warriors of Rock DLC">
</button> 

<button
class="tab"
onclick="switchTab('rb1dlc', this)"
>
<img src="assets/rb1dlc.png" alt="Rock Band DLC">
</button>   
  
</div>

</div>

<div class="header-right">
<p id="song-count"></p>
</div>

</header>

<main>

<!-- SONG CARDS ARE INSERTED HERE BY script.js -->
<div id="song-grid" class="song-grid"></div>

</main>

<footer>

<p>This project is not affiliated with Harmonix.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
